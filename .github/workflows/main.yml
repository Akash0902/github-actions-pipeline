name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

# Minimal default permissions
permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: devops-eks-cluster
  IMAGE_NAME: nodejs-eks-demo
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  # ------------------------------------------------
  # INFRASTRUCTURE USING TERRAFORM
  # ------------------------------------------------
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      sonar_ip: ${{ steps.tf_outputs.outputs.sonar_ip }}
      jfrog_ip: ${{ steps.tf_outputs.outputs.jfrog_ip }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS auth
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "sonar_ip=$(terraform output -raw sonarqube_public_ip)" >> "$GITHUB_OUTPUT"
          echo "jfrog_ip=$(terraform output -raw jfrog_public_ip)" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------
  # BUILD + SONARQUBE ANALYSIS
  # ------------------------------------------------
  build_and_scan:
    name: Build and Sonar Scan
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        working-directory: app
        run: npm ci

      - name: Wait for SonarQube to be reachable
        env:
          SONAR_HOST_URL: http://${{ needs.terraform.outputs.sonar_ip }}:9000
        run: |
          echo "Waiting for SonarQube at $SONAR_HOST_URL ..."
          for i in {1..60}; do
            if curl -fsS "$SONAR_HOST_URL/api/system/status" >/dev/null 2>&1; then
              echo "SonarQube is up."
              exit 0
            fi
            echo "Still waiting... ($i/60)"
            sleep 10
          done
          echo "SonarQube did not become ready in time."
          exit 1

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          projectBaseDir: app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://${{ needs.terraform.outputs.sonar_ip }}:9000

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://${{ needs.terraform.outputs.sonar_ip }}:9000

  # ------------------------------------------------
  # DOCKER BUILD AND PUSH TO JFROG
  # ------------------------------------------------
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [terraform, build_and_scan]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to JFrog Docker Registry
        env:
          JFROG_HOST: ${{ needs.terraform.outputs.jfrog_ip }}
          JFROG_USER: ${{ secrets.JFROG_USERNAME }}
          JFROG_PASS: ${{ secrets.JFROG_PASSWORD }}
        run: |
          echo "$JFROG_PASS" | docker login "$JFROG_HOST:8082" -u "$JFROG_USER" --password-stdin

      - name: Build Docker Image
        env:
          JFROG_HOST: ${{ needs.terraform.outputs.jfrog_ip }}
        run: |
          docker build \
            -t "$JFROG_HOST:8082/docker-local/nodejs-app:${{ env.IMAGE_TAG }}" \
            ./app

      - name: Push Docker Image
        env:
          JFROG_HOST: ${{ needs.terraform.outputs.jfrog_ip }}
        run: |
          docker push "$JFROG_HOST:8082/docker-local/nodejs-app:${{ env.IMAGE_TAG }}"

  # ------------------------------------------------
  # DEPLOY TO EKS
  # ------------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [terraform, docker]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS auth
        run: aws sts get-caller-identity

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # OPTIONAL but recommended: ensure the deployment uses the new image tag
      # Update container name if different from "nodejs-container"
      - name: Update Image to latest tag
        env:
          JFROG_HOST: ${{ needs.terraform.outputs.jfrog_ip }}
        run: |
          kubectl set image deployment/nodejs-deployment \
            nodejs-container="$JFROG_HOST:8082/docker-local/nodejs-app:${{ env.IMAGE_TAG }}" \
            --record=true

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/nodejs-deployment

  # ------------------------------------------------
  # EMAIL NOTIFICATION
  # ------------------------------------------------
  notify:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs: [terraform, build_and_scan, docker, deploy]
    if: always()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: GitHub Actions CI/CD Pipeline Status - ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            CI/CD Pipeline Finished

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Run: ${{ github.run_id }}

            Terraform: ${{ needs.terraform.result }}
            SonarQube Scan: ${{ needs.build_and_scan.result }}
            Docker Build: ${{ needs.docker.result }}
            Deployment to EKS: ${{ needs.deploy.result }}

            Check GitHub Actions logs for full details.
